name: Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    permissions:
      contents: read

    env:
      AWS_REGION: us-west-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx (required for cross-platform builds)
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/arm64
        id: push
        working-directory: app/
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/demo-ecs:${{ github.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${IMAGE_URI} .
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

  terraform:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_REGION: us-west-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -var-file=envs/dev/dev.tfvars

      - name: Get ALB DNS Name
        id: tf_output
        working-directory: infra
        run: echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Deployment ready\n\nhttp://${{ steps.tf_output.outputs.alb_dns_name }}`,
            })
